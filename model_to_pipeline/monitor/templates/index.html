<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SiMa.ai Vision Model To Pipeline</title>

  <!-- Fonts & CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <!-- Banner -->
  <header class="app-banner">
    <h1>SiMa.ai Vision Model To Pipeline</h1>
  </header>

  <!-- Main layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <ul class="nav flex-column nav-pills">
        <li class="nav-item">
          <a class="nav-link active" data-bs-toggle="pill" href="#workflow-tab">
            Workflow Monitor
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-bs-toggle="pill" href="#model-stats-tab">
            Compiled Model Stats
          </a>
        </li>
      </ul>
    </nav>

    <!-- Main content -->
    <main class="main-content tab-content">
      <!-- Workflow tab -->
      <div class="tab-pane fade show active" id="workflow-tab">
        <!-- Progress steps -->
        <div class="progress-container">
          {% for step in steps %}
          <div class="step {% if step.name == 'Specification' %}specification{% endif %}"
               id="step-{{ step.id }}"
               data-step="{{ step.name }}"
               onclick="selectStep({{ step.id }})">
            <div class="circle {% if step.name == 'Specification' %}specification{% endif %}">
              {% include 'icons/' ~ step.icon %}
            </div>
            <p>{{ step.name }}</p>
          </div>
          {% endfor %}
        </div>

        <!-- Step content -->
        <div class="content-container" id="step-content"></div>
      </div>

      <!-- Model Stats tab -->
      <div class="tab-pane fade" id="model-stats-tab">
        <!-- Placeholder (default) -->
        <div id="stats-placeholder" class="content-container stats-placeholder">
          <p class="text-muted">
            Once the workflow completes, you will see model stats here.
          </p>
        </div>

        <!-- Actual Model Stats (hidden until ready) -->
        <div id="stats-content" class="content-container" style="display:none;">

          <h3 style="margin-bottom: 20px;">Model Operator Stats</h3>

          <div id="controls">
            <select id="viewSelector" onchange="handleViewChange()">
              <option value="timeline" selected>Timeline View</option>
              <option value="duration">Duration View</option>
              <option value="gantt">Gantt Chart</option>
            </select>

            <input
              type="text"
              id="searchBox"
              placeholder="Operator Filter"
              oninput="filterTable()"
            >

            <label id="threshold-label">
              Min Duration:
              <span id="threshold-value">0</span> cycles
            </label>

            <input
              type="range"
              id="threshold-slider"
              min="0"
              max="100000"
              step="100"
              value="0"
              oninput="updateThreshold()"
            >
          </div>

          <div id="chart" style="width:100%;height:600px;margin-top:20px;"></div>
          <div id="table" style="margin-top:20px;"></div>

        </div>
      </div>

    </main>
  </div>

  <!-- Scripts -->
  <script>
    const yamlSections = {{ yaml_sections | default([]) | tojson }};
  </script>
  <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@latest/dist/css/tabulator.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@latest/dist/js/tabulator.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>  
  <script src="{{ url_for('static', filename='viz.js') }}"></script>  
  <script src="{{ url_for('static', filename='app.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
